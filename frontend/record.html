<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Healthcare Blockchain | Medical Records</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #121212;
      --panel-2: #171717;
      --accent: #00d4ff;
      --muted: #9ab0bb;
      --border: #1e3642;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: var(--bg); color: #e8f8ff; }
    nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px; border-bottom: 1px solid var(--border); background: #0d0d0d; }
    .brand { color: var(--accent); font-weight: 700; }
    .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
    .nav-links a { color: #e8f8ff; text-decoration: none; padding: 8px 10px; border-radius: 8px; }
    .nav-links a.active, .nav-links a:hover { color: var(--accent); background: var(--panel-2); }
    .container { width: min(1240px, 96%); margin: 24px auto; }
    .panel { border: 1px solid var(--border); border-radius: 12px; background: var(--panel); padding: 16px; margin-bottom: 18px; }
    .wallet-strip { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .mono { font-family: Consolas, monospace; }
    h2, h3 { color: var(--accent); margin-top: 0; }
    form { display: grid; grid-template-columns: repeat(4, minmax(170px, 1fr)); gap: 12px; }
    .full { grid-column: 1 / -1; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 6px; }
    input, textarea, select {
      width: 100%; background: #0f0f0f; border: 1px solid var(--border); border-radius: 8px;
      color: #e8f8ff; padding: 10px;
    }
    textarea { min-height: 80px; resize: vertical; }
    button {
      background: var(--accent); border: 1px solid var(--accent); color: #00151c;
      padding: 10px 14px; border-radius: 8px; font-weight: 600; cursor: pointer;
    }
    .status { color: var(--muted); font-size: 0.9rem; }
    .record-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: var(--panel-2);
      margin-top: 10px;
    }
    .search-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
    .search-row input { min-width: 230px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid var(--border); text-align: left; padding: 9px; font-size: 0.9rem; }
    th { background: #0f1a20; color: var(--accent); }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 1100px) { form { grid-template-columns: repeat(2, minmax(170px, 1fr)); } }
    @media (max-width: 980px) { .mini-grid, form { grid-template-columns: 1fr; } }
  </style>
</head>
<body data-page="record">
  <nav>
    <div class="brand">Healthcare Chain</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="hospital.html">Hospital</a>
      <a href="doctor.html">Doctor</a>
      <a href="patient.html">Patient</a>
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="record.html">Records</a>
    </div>
  </nav>

  <main class="container">
    <section class="panel wallet-strip">
      <div>
        <div>Wallet: <span id="walletAddress" class="mono">Not connected</span></div>
        <div>Network: <span id="networkName" class="mono">-</span></div>
        <div>Doctor ID: <span id="recordDoctorId" class="mono">-</span></div>
        <div>Hospital ID: <span id="doctorHospitalBadge" class="mono">-</span></div>
      </div>
      <button type="button" id="connectWalletBtn">Connect MetaMask</button>
    </section>

    <section id="statusBox" class="panel status">Medical record panel ready.</section>

    <section class="mini-grid">
      <article class="panel">
        <h3>Search Patient by ID</h3>
        <div class="search-row" id="doctorPatientSearchForm">
          <div>
            <label for="doctorPatientId">Patient ID *</label>
            <input id="doctorPatientId" type="number" min="1" required />
          </div>
          <button type="button" id="searchPatientBtn">Search Patient</button>
        </div>
        <div id="recordPatientDetails" class="record-card">No patient selected.</div>
      </article>

      <article class="panel">
        <h3>Past Records for Patient</h3>
        <div id="recordResults">
          <div class="record-card">Search a patient to load records.</div>
        </div>
      </article>
    </section>

    <section class="panel">
      <h2>Add New Medical Record</h2>
      <form id="addRecordForm">
        <div>
          <label for="recordId">Record ID *</label>
          <input id="recordId" type="number" min="1" required />
        </div>
        <div>
          <label for="recordPatientId">Patient ID *</label>
          <input id="recordPatientId" type="number" min="1" required readonly />
        </div>
        <div>
          <label for="recordDoctorIdInput">Doctor ID *</label>
          <input id="recordDoctorIdInput" type="number" min="1" required readonly />
        </div>
        <div>
          <label for="recordHospitalId">Hospital ID *</label>
          <input id="recordHospitalId" type="number" min="1" required />
        </div>

        <div>
          <label for="complaints">Complaints *</label>
          <input id="complaints" type="text" required />
        </div>
        <div>
          <label for="duration">Duration *</label>
          <input id="duration" type="text" required />
        </div>
        <div>
          <label for="familyHistory">Family History *</label>
          <input id="familyHistory" type="text" required />
        </div>
        <div>
          <label for="personalHistory">Personal History *</label>
          <input id="personalHistory" type="text" required />
        </div>

        <div class="full">
          <label for="drugHistory">Drug History *</label>
          <textarea id="drugHistory" required></textarea>
        </div>
        <div class="full">
          <label for="diagnosisSummary">Diagnosis Summary *</label>
          <textarea id="diagnosisSummary" required></textarea>
        </div>
        <div class="full">
          <label for="prescription">Prescription / Current Medication *</label>
          <textarea id="prescription" required></textarea>
        </div>

        <div class="full">
          <label for="treatment">Treatment *</label>
          <textarea id="treatment" required></textarea>
        </div>
        <div>
          <label for="treatmentDate">Treatment Date *</label>
          <input id="treatmentDate" type="date" required />
        </div>
        <div>
          <label for="discharge">Discharge *</label>
          <input id="discharge" type="text" required />
        </div>
        <div>
          <label for="followup">Follow-up *</label>
          <input id="followup" type="text" required />
        </div>

        <div>
          <label for="blood">Blood Test</label>
          <input id="blood" type="text" placeholder="Optional" />
        </div>
        <div>
          <label for="urine">Urine Test</label>
          <input id="urine" type="text" placeholder="Optional" />
        </div>
        <div>
          <label for="ecg">ECG</label>
          <input id="ecg" type="text" placeholder="Optional" />
        </div>
        <div>
          <label for="mri">MRI</label>
          <input id="mri" type="text" placeholder="Optional" />
        </div>
        <div>
          <label for="ct">CT</label>
          <input id="ct" type="text" placeholder="Optional" />
        </div>
        <div>
          <label for="xray">X-Ray</label>
          <input id="xray" type="text" placeholder="Optional" />
        </div>

        <div>
          <label for="insuranceApplicable">Insurance Applicable *</label>
          <select id="insuranceApplicable" required>
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </div>
        <div>
          <label for="policyNumber">Policy Number</label>
          <input id="policyNumber" type="text" placeholder="Optional" />
        </div>
        <div>
          <label for="insurer">Insurer</label>
          <input id="insurer" type="text" placeholder="Optional" />
        </div>
        <div>
          <label for="insuranceType">Insurance Type</label>
          <input id="insuranceType" type="text" placeholder="Optional" />
        </div>
        <div class="full">
          <label for="coverageLimit">Coverage Limit</label>
          <input id="coverageLimit" type="text" placeholder="Optional" />
        </div>

        <div class="full">
          <button id="addRecordBtn" type="submit">Add Medical Record</button>
        </div>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.10.4/dist/web3.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
